# Render Blueprint: https://render.com/docs/blueprint-spec
# Создаёт managed Postgres, Django-бэк (Web Service) и Vite PWA (Static Site).
# После первого деплоя проверь имена сервисов и при необходимости поправь
# `destination` в routes для фронта.

databases:
  - name: pwa-test-db-frankfurt
    plan: free
    databaseName: mydb
    user: admin

services:
  # ---------- Backend: Django + DRF ----------
  - type: web
    name: pwa-test-backend
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: python manage.py migrate --no-input && gunicorn config.wsgi:application
    healthCheckPath: /api/schema/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: pwa-test-db-frankfurt
          property: connectionString
      # Заполни после создания фронта: https://pwa-test-frontend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false

  # ---------- Frontend: Vite + Vue PWA ----------
  # У static sites нет поля `region` — они раздаются с глобального CDN Render.
  - type: web
    name: pwa-test-frontend
    runtime: static
    rootDir: frontend
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: ./dist
    autoDeploy: true
    pullRequestPreviewsEnabled: false
    routes:
      # Проксируем /api на backend, чтобы фронт ходил same-origin
      # (как это делает vite proxy в dev). Это избавляет от CORS и даёт
      # корректную работу Workbox-кэша для /api/todos.
      - type: rewrite
        source: /api/*
        destination: https://pwa-test-backend.onrender.com/api/*
      # SPA fallback: любой путь отдаёт index.html.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Service Worker и манифест не должны кэшироваться CDN —
      # иначе пользователи не получат обновления PWA.
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /registerSW.js
        name: Cache-Control
        value: no-cache
      - path: /manifest.webmanifest
        name: Cache-Control
        value: no-cache
